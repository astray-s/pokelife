<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="#fff" stroke="#333" stroke-width="2"/>
  
  <!-- Top red half -->
  <path d="M 2 50 A 48 48 0 0 1 98 50 L 98 50 A 48 48 0 0 0 2 50 Z" fill="url(#redGradient)"/>
  
  <!-- Middle black band -->
  <rect x="0" y="45" width="100" height="10" fill="#333"/>
  
  <!-- Center white circle -->
  <circle cx="50" cy="50" r="15" fill="#fff" stroke="#333" stroke-width="3"/>
  
  <!-- Center inner circle -->
  <circle cx="50" cy="50" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  
  <!-- Shine effect -->
  <ellipse cx="35" cy="30" rx="12" ry="8" fill="#fff" opacity="0.4"/>
</svg>
